<style>
  :root {

  .pill.partial { color: var(--amber); border-color: #4a3a14; }

  .banner b { color: #f7e3b5; }
  .tabs { display: flex; gap: 6px; margin: 6px 0 12px; flex-wrap: wrap; }
  .tab { background: var(--chip); border: 1px solid var(--line); color: var(--muted); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { text-align: right; padding: 9px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th:first-child, td:first-child, th.l, td.l { text-align: left; }
  thead th { color: var(--muted); font-weight: 550; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--text); }
  tbody tr:hover { background: var(--panel2); }
  .apy { color: var(--green); font-weight: 640; }
  .venue { color: var(--text); }
  .chip { font-size: 11px; padding: 1px 7px; border-radius: 6px; background: var(--chip); border: 1px solid var(--line); color: var(--muted); }
  .util-bar { display: inline-block; width: 54px; height: 6px; border-radius: 3px; background: #233; vertical-align: middle; overflow: hidden; margin-left: 6px; }
  .util-bar > i { display: block; height: 100%; background: var(--amber); }
  details { margin-top: 18px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
  summary { cursor: pointer; padding: 11px 14px; color: var(--muted); font-size: 13px; }
  summary:hover { color: var(--text); }
  details[open] summary { border-bottom: 1px solid var(--line); }
  .pad { padding: 4px 6px 8px; }
  .reason { color: var(--muted); font-size: 12px; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  .more { display: block; width: 100%; margin-top: 10px; padding: 9px 0; background: var(--chip); border: 1px solid var(--line); border-radius: 8px; color: var(--muted); font-size: 13px; cursor: pointer; }
  .more:hover { color: var(--text); border-color: var(--muted); }
  .foot { color: var(--muted); font-size: 11px; margin-top: 22px; line-height: 1.6; }
  .foot a { color: var(--text); text-decoration: underline; }
  .err { color: var(--red); }
</style>

<script>
(function () {
  "use strict";

  // ---- Wayfinder bridge: capture parent origin and reply only to it ----
  var parentOrigin = null;
  window.addEventListener("message", function (e) {
    var d = e.data;
    if (!d || typeof d !== "object") return;
    if (d.type === "wf:hello") {
      parentOrigin = e.origin;
      try { window.parent.postMessage({ type: "wf:hello_ack" }, parentOrigin); } catch (_) {}
    }
  });

  var CHAINS = { 1: "Ethereum", 8453: "Base", 42161: "Arbitrum", 999: "HyperEVM", 137: "Polygon", 56: "BSC", 43114: "Avalanche", 9745: "Plasma" };
  var VENUE_LABEL = { aave_v3: "Aave V3", morpho_blue_market: "Morpho Blue", morpho_vault: "Morpho Vault", euler_v2: "Euler V2", hyperlend: "Hyperlend", sparklend: "SparkLend", moonwell: "Moonwell" };

  function pct(x) { return (x == null) ? "—" : (x * 100).toFixed(2) + "%"; }
  function usd(x) {
    if (x == null) return "—";
    if (x >= 1e9) return "$" + (x / 1e9).toFixed(2) + "B";
    if (x >= 1e6) return "$" + (x / 1e6).toFixed(2) + "M";
    if (x >= 1e3) return "$" + (x / 1e3).toFixed(1) + "K";
    return "$" + x.toFixed(0);
  }
  function chain(id) { return CHAINS[id] || ("chain " + id); }
  function venue(v) { return VENUE_LABEL[v] || v; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  var PAGE_SIZE = 50;
  var state = { data: null, asset: "ALL", sortKey: "supply_apy", sortDir: -1, limit: PAGE_SIZE };

  function render() {
    var d = state.data;
    var app = document.getElementById("app");
    if (!d) {
      app.innerHTML = '<div class="empty err">Scan data unavailable. (data/scan.json could not be loaded.)</div>';
      app.setAttribute("data-path-ready", "true");
      return;
    }

    var assets = Object.keys(d.by_asset || {}).sort();
    var rows = (d.ranked || []).slice();
    if (state.asset !== "ALL") rows = rows.filter(function (r) { return r.asset_symbol === state.asset; });
    rows.sort(function (a, b) {
      var k = state.sortKey, av = a[k], bv = b[k];
      if (typeof av === "string") return state.sortDir * av.localeCompare(bv);
      return state.sortDir * (((av == null ? -1 : av)) - ((bv == null ? -1 : bv)));
    });

    var snapDate = (d.generatedAt || "").slice(0, 10) || "unknown";
    var html = "";
    html += '<header>';
    html += '<div><h1>Stablecoin Yield Rotator</h1>';
    html += '<div class="sub">Ranked supply APY across lending venues · scan snapshot</div></div>';
    html += '<span class="pill">Snapshot of ' + esc(snapDate) + ' (install path for latest)</span>';
    html += '</header>';

    var allRows = (d.ranked || []).concat(d.excluded || []);
    var venueSet = {}, chainSet = {};
    allRows.forEach(function (r) { venueSet[r.venue] = true; chainSet[r.chain_id] = true; });
    var venueNames = Object.keys(venueSet).map(venue).sort().join(", ");
    var chainIds = Object.keys(chainSet).map(Number).sort(function (a, b) { return a - b; });

    html += '<div class="stats">';
    html += stat(d.ranked_count, "Ranked markets");
    html += stat(topApy(d), "Top APY");
    html += stat(d.excluded_count, "Excluded");
    html += '<div class="stat" title="' + esc(venueNames) + '"><div class="n">' + Object.keys(venueSet).length + '</div><div class="l">Venues</div></div>';
    html += '<div class="stat" title="' + esc(chainIds.map(chain).join(", ")) + '"><div class="n">' + chainIds.length + '</div><div class="l">Networks</div></div>';
    html += '</div>';

    if (d.failure_count) {
      html += '<div class="banner"><b>' + d.failure_count + ' venue source(s) unavailable</b> at scan time — results are partial. ';
      html += esc((d.failures || []).map(function (f) { return venue(f.venue) + "/" + chain(f.chain_id); }).join(", ")) + '.</div>';
    }

    html += '<div class="tabs">';
    html += tab("ALL", "All");
    assets.forEach(function (a) { html += tab(a, a + " (" + d.by_asset[a].length + ")"); });
    html += '</div>';

    if (!rows.length) {
      html += '<div class="empty">No ranked markets for this filter.</div>';
    } else {
      html += '<table><thead><tr>';
      html += th("asset_symbol", "Asset", true);
      html += th("venue", "Venue", true);
      html += th("chain_id", "Chain", true);
      html += th("supply_apy", "Supply APY");
      html += th("utilization", "Utilization");
      html += th("tvl_usd", "TVL");
      html += '</tr></thead><tbody>';
      rows.slice(0, state.limit).forEach(function (r) {
        html += '<tr>';
        html += '<td class="l"><span class="chip">' + esc(r.asset_symbol) + '</span></td>';
        html += '<td class="l venue">' + esc(venue(r.venue)) + '</td>';
        html += '<td class="l">' + esc(chain(r.chain_id)) + '</td>';
        html += '<td class="apy">' + pct(r.supply_apy) + '</td>';
        html += '<td>' + pct(r.utilization) + utilBar(r.utilization) + '</td>';
        html += '<td>' + usd(r.tvl_usd) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      if (rows.length > state.limit) {
        html += '<button class="more" id="view-more">View more (' + (rows.length - state.limit) + ' remaining)</button>';
      }
    }

    // Excluded
    var excluded = (d.excluded || []);
    if (excluded.length) {
      html += '<details><summary>' + excluded.length + ' market(s) excluded by scan constraints</summary><div class="pad"><table><tbody>';
      excluded.forEach(function (r) {
        html += '<tr>';
        html += '<td class="l"><span class="chip">' + esc(r.asset_symbol) + '</span></td>';
        html += '<td class="l venue">' + esc(venue(r.venue)) + '</td>';
        html += '<td class="l">' + esc(chain(r.chain_id)) + '</td>';
        html += '<td class="apy">' + pct(r.supply_apy) + '</td>';
        html += '<td class="l reason">' + esc(r.exclude_reason) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div></details>';
    }

    html += '<div class="foot">' + d.row_count + ' markets discovered · static read-only snapshot bundled with the path. This dashboard does not connect to, read, or transmit any wallet data.</div>';

    app.innerHTML = html;
    app.setAttribute("data-path-ready", "true");
    wireEvents();
  }

  function stat(n, label) { return '<div class="stat"><div class="n">' + esc(n) + '</div><div class="l">' + esc(label) + '</div></div>'; }

  function topApy(d) { var r = (d.ranked || [])[0]; return r ? (r.supply_apy * 100).toFixed(2) + "%" : "—"; }
  function tab(key, label) { return '<button class="tab' + (state.asset === key ? " active" : "") + '" data-asset="' + esc(key) + '">' + esc(label) + '</button>'; }
  function th(key, label, left) { return '<th class="' + (left ? "l " : "") + '" data-sort="' + key + '">' + esc(label) + '</th>'; }
  function utilBar(u) { if (u == null) return ""; var w = Math.max(0, Math.min(100, u * 100)); return '<span class="util-bar"><i style="width:' + w.toFixed(0) + '%"></i></span>'; }

  function wireEvents() {
    Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (el) {
      el.addEventListener("click", function () { state.asset = el.getAttribute("data-asset"); state.limit = PAGE_SIZE; render(); });
    });
    var more = document.getElementById("view-more");
    if (more) more.addEventListener("click", function () { state.limit += PAGE_SIZE; render(); });
    Array.prototype.forEach.call(document.querySelectorAll("th[data-sort]"), function (el) {
      el.addEventListener("click", function () {
        var k = el.getAttribute("data-sort");
        if (state.sortKey === k) state.sortDir *= -1; else { state.sortKey = k; state.sortDir = -1; }
        render();
      });
    });
  }

  // Snapshot is inlined (below) so the applet renders regardless of iframe
  // sandbox/origin — no runtime fetch, no CORS/relative-path dependency.
  try {
    var el = document.getElementById("scan-data");
    state.data = el ? JSON.parse(el.textContent) : null;
  } catch (_) { state.data = null; }
  render();
})();
</script>
