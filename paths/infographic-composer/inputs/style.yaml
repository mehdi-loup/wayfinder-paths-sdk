styles:
  default:
    title: Protocol Infographic
    canvas:
      width: 1080
      height: 2100
      background: '#f4f7fb'
    colors:
      ink: '#17212b'
      muted: '#586474'
      panel: '#ffffff'
      panel_alt: '#eef6f4'
      line: '#cfd8e3'
      accent: '#0f8b8d'
      accent_2: '#ef6f4e'
      accent_3: '#325d9d'
      accent_4: '#f2b84b'
      warning: '#a16207'
      danger: '#b42318'
    typography:
      family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif
      title_size: 56
      section_size: 30
      body_size: 20
      small_size: 15
    accessibility:
      min_contrast: 4.5
      max_words_per_label: 12
      require_alt_text: true
