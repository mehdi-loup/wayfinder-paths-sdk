schema_version: '0.1'
slug: spread-radar-reference
name: Spread Radar Reference
version: 0.1.1
summary: Reference path for the spread-radar strategy pipeline. Clusters a user-defined
  asset universe by time-series similarity, enumerates spread candidates, layers in
  field research, and surfaces a validated relative-value trade with invalidation
  rules and a monitoring job.
primary_kind: policy
tags:
- spread-radar
- relative-value
- clustering
components:
- id: main
  kind: script
  path: scripts/main.py
applet:
  build_dir: applet/dist
  manifest: applet/applet.manifest.json
skill:
  enabled: true
  source: generated
  name: spread-radar-reference
  description: Reference path for the spread-radar strategy pipeline. Clusters assets
    by time-series regime, enumerates spread candidates, validates they are not hidden
    beta, and outputs a monitorable spread trade or null.
  instructions: skill/instructions.md
  runtime:
    mode: thin
    package: wayfinder-paths
    version: 0.8.0
    python: '>=3.12,<3.13'
    component: main
    bootstrap: uv
    fallback_bootstrap: pipx
    prefer_existing_runtime: true
    require_api_key: false
    api_key_env: WAYFINDER_API_KEY
    config_path_env: WAYFINDER_CONFIG_PATH
pipeline:
  archetype: spread-radar
  graph: pipeline/graph.yaml
  artifacts_dir: .wf-artifacts
  entry_command: spread-radar
  primary_hosts:
  - claude
  - opencode
  output_contract:
  - signal_snapshot
  - selected_playbook
  - candidate_expressions
  - null_state
  - risk_checks
  - job
  - next_invalidation
inputs:
  slots:
    theme:
      type: markdown
      path: inputs/theme.md
      required: true
      schema: schemas/theme.schema.json
    universe:
      type: yaml
      path: inputs/universe.yaml
      required: false
      schema: schemas/universe.schema.json
    notes:
      type: markdown
      path: inputs/notes.md
      required: false
      schema: schemas/notes.schema.json
agents:
- id: universe-builder
  phase: universe_builder
  description: Resolve the asset universe and fetch price/funding data.
  tools:
  - read
  - glob
  - grep
  - bash
  output: .wf-artifacts/$RUN_ID/universe.json
  host_mode: worker
- id: pair-screener
  phase: pair_screener
  description: Screen all pairs by half-life and cointegration, classify as stable
    or drift.
  tools:
  - read
  - glob
  - grep
  - bash
  output: .wf-artifacts/$RUN_ID/pair_screen.json
  host_mode: worker
- id: signal-researcher
  phase: signal_research
  description: Parameter sweep with walk-forward backtesting to find the best signal
    config.
  tools:
  - read
  - glob
  - grep
  - bash
  output: .wf-artifacts/$RUN_ID/signal_research.json
  host_mode: worker
- id: skeptic
  phase: skeptic
  description: 'Quantitative validation: hidden beta, fee sensitivity, parameter robustness,
    concentration.'
  tools:
  - read
  - glob
  - grep
  - bash
  output: .wf-artifacts/$RUN_ID/skeptic.json
  host_mode: worker
host:
  claude:
    rules_file: .claude/CLAUDE.md
    skill_dir: .claude/skills
    agent_dir: .claude/agents
    settings_file: .claude/settings.json
  opencode:
    rules_file: AGENTS.md
    skill_dir: .opencode/skills
    agent_dir: .opencode/agents
    config_file: opencode.json
    command_dir: .opencode/commands
    plugin_dir: .opencode/plugins
    tool_dir: .opencode/tools
runtime:
  state_dir: .wf-state
  tests_dir: tests
  graph_nodes:
  - intake
  - universe_builder
  - pair_screener
  - signal_research
  - skeptic
  - finalize
